version: 0.2

phases:
  install:
    commands:
      - echo "Install phase"

  build:
    commands:
      - echo "Build phase"
      - mkdir -p output
      - cp Portal.html output/

      # CodeDeploy 파일 포함
      - cp appspec.yml ./dh-bucket/
      - mkdir -p ./dh-bucket/scripts
      - cp ./dh-bucket/scripts/restart.sh scripts/

  post_build:
    commands:
      - echo "Post build phase"

artifacts:
  files:
    - appspec.yml
    - output/**/*
    - scripts/**/*